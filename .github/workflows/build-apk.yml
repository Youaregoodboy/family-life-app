name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Build Parent APK with Capacitor
        run: |
          mkdir -p parent-app
          cd parent-app
          npm init -y
          npm install @capacitor/core @capacitor/android@5.7.0
          npx cap init "FamilyLifeParent" "com.familylife.parent" --web-dir ../web/parent
          npx cap add android

      - name: Build Child APK with Capacitor
        run: |
          mkdir -p child-app
          cd child-app
          npm init -y
          npm install @capacitor/core @capacitor/android@5.7.0
          npx cap init "FamilyLifeChild" "com.familylife.child" --web-dir ../web/child
          npx cap add android

      - name: Set Java Version in Gradle
        run: |
          sed -i 's/sourceCompatibility = JavaVersion.VERSION_21/sourceCompatibility = JavaVersion.VERSION_17/g' parent-app/android/app/build.gradle
          sed -i 's/targetCompatibility = JavaVersion.VERSION_21/targetCompatibility = JavaVersion.VERSION_17/g' parent-app/android/app/build.gradle
          sed -i 's/sourceCompatibility = JavaVersion.VERSION_21/sourceCompatibility = JavaVersion.VERSION_17/g' child-app/android/app/build.gradle
          sed -i 's/targetCompatibility = JavaVersion.VERSION_21/targetCompatibility = JavaVersion.VERSION_17/g' child-app/android/app/build.gradle

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Parent Android APK
        run: |
          cd parent-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Child Android APK
        run: |
          cd child-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            parent-app/android/app/build/outputs/apk/debug/*.apk
            child-app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            parent-app/android/app/build/outputs/apk/debug/*.apk
            child-app/android/app/build/outputs/apk/debug/*.apk
          name: Release ${{ github.run_number }}
          tag_name: v${{ github.run_number }}
          draft: false
          prerelease: false