name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Build static files
        run: |
          mkdir -p build/parent build/child
          cp -r web/parent/* build/parent/
          cp -r web/child/* build/child/

      - name: Start Flask server in background
        run: |
          python run.py &
          sleep 3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PWABuilder CLI
        run: npm install -g @pwabuilder/pwabuilder

      - name: Build Parent APK
        run: |
          pwabuilder build --url http://localhost:5000/parent/ --platforms android --output ./build/apk-parent/ || true

      - name: Build Child APK
        run: |
          pwabuilder build --url http://localhost:5000/child/ --platforms android --output ./build/apk-child/ || true

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            build/apk-parent/*.apk
            build/apk-child/*.apk
          if-no-files-found: warn

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/apk-parent/*.apk
            build/apk-child/*.apk
          name: Release ${{ github.run_number }}
          tag_name: v${{ github.run_number }}
          draft: false
          prerelease: false