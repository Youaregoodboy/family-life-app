name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Capacitor
        run: npm install -g @capacitor/cli@5.7.0

      - name: Create Parent App
        run: |
          mkdir -p parent-app/www
          cp -r web/parent/* parent-app/www/
          cd parent-app
          npm init -y
          npm install @capacitor/core@5.7.0 @capacitor/android@5.7.0
          npx cap init "亲子时光-父母端" "com.familylife.parent" --web-dir www
          npx cap add android

      - name: Create Child App
        run: |
          mkdir -p child-app/www
          cp -r web/child/* child-app/www/
          cd child-app
          npm init -y
          npm install @capacitor/core@5.7.0 @capacitor/android@5.7.0
          npx cap init "亲子时光-子女端" "com.familylife.child" --web-dir www
          npx cap add android

      - name: Fix Gradle Java Version
        run: |
          sed -i 's/VERSION_21/VERSION_17/g' parent-app/android/variables.gradle || true
          sed -i 's/VERSION_21/VERSION_17/g' parent-app/android/app/build.gradle || true
          sed -i 's/VERSION_21/VERSION_17/g' child-app/android/variables.gradle || true
          sed -i 's/VERSION_21/VERSION_17/g' child-app/android/app/build.gradle || true

      - name: Build Parent APK
        run: |
          cd parent-app/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build Child APK
        run: |
          cd child-app/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK files
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist
          cp parent-app/android/app/build/outputs/apk/debug/app-debug.apk dist/family-life-parent-v${VERSION}.apk
          cp child-app/android/app/build/outputs/apk/debug/app-debug.apk dist/family-life-child-v${VERSION}.apk
          ls -la dist/

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: dist/*.apk

      - name: Generate release notes
        run: |
          cat > release_notes.md << EOF
          ## 亲子时光 v${{ steps.version.outputs.version }}

          ### 更新内容
          - 自动更新功能：新版本发布后自动提醒
          - 修复已知问题
          - 优化用户体验

          ### 下载
          - 父母端：family-life-parent-v${{ steps.version.outputs.version }}.apk
          - 子女端：family-life-child-v${{ steps.version.outputs.version }}.apk
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          name: v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false